<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1">
  <title>Rubik's Cube Simulator</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #2b2b2b; }
    #canvas { display: block; width: 100%; height: 100%; outline: none; }
    /* Hide default Emscripten stdout/stderr output so only the 3D view is visible */
    #output { display: none !important; }
    .emscripten { padding: 0; margin: 0; }
  </style>
</head>
<body>
  <canvas id="canvas" tabindex="1"></canvas>
  <pre id="output"></pre>
  <script>
  (function() {
    var canvas = document.getElementById('canvas');
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    function sizeCanvas() {
      var w = window.innerWidth;
      var h = window.innerHeight;
      var pw = Math.round(w * dpr);
      var ph = Math.round(h * dpr);
      canvas.width = pw;
      canvas.height = ph;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      if (typeof Module !== 'undefined' && Module.emscripten_set_canvas_element_size) {
        Module.emscripten_set_canvas_element_size(canvas, pw, ph);
      }
    }
    sizeCanvas();
    window.addEventListener('resize', sizeCanvas);
    window.addEventListener('orientationchange', sizeCanvas);
    var Module = typeof Module !== 'undefined' ? Module : {};
    Module.canvas = canvas;
    var preRun = Module.preRun || [];
    Module.preRun = preRun.concat([function() {
      Module.canvas = document.getElementById('canvas');
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      sizeCanvas();
    }]);
    window.Module = Module;
  })();
  </script>
  {{{ SCRIPT }}}
</body>
</html>
